network:
  name: resnet20_32x32
  num_classes: '@{dataset.num_classes}'
  margin: 0.
  pretrained: False          # set 'True' to load pretrained model
  checkpoint: ./checkpoints/cifar10_resnet20/best.ckpt            # ignore if pretrained is false
  num_gpus: '@{num_gpus}'

dataset:
  normalization_type: resnet20
