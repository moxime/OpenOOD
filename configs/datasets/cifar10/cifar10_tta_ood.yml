ood_dataset:
  name: cifar10_ood
  num_classes: 10

  num_workers: '@{num_workers}'
  num_gpus: '@{num_gpus}'
  num_machines: '@{num_machines}'

  dataset_class: ImglistDataset
  batch_size: 128 # for mini batch fine tuning, see chunk_size in test_tta_ood pipeline for size of chunks

  padding:
    datasets: [lsunr]

    lsunr:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_lsunr.txt

    svhn:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_svhn.txt


  split_names: [val, nearood, farood, mixture]

  val:
    data_dir: ./data/images_classic/
    imglist_pth: ./data/benchmark_imglist/cifar10/val_tin.txt
      
    
  nearood:
    datasets: [cifar100, tin]

    cifar100:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_cifar100.txt

    tin:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_tin.txt


  farood:
    datasets: [mnist, svhn, texture, places365]

    mnist:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_mnist.txt

    svhn:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_svhn.txt

    texture:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_texture.txt

    places365:
      data_dir: ./data/images_classic/
      imglist_pth: ./data/benchmark_imglist/cifar10/test_places365.txt

      
  mixture:
    datasets: [cifar100_mix, tin_mix]

    cifar100_mix:
      sets: [cifar100, mnist, texture]

    tin_mix:
      sets: [tin, svhn, places365]

    old_mix:
      sets: [tin, svhn, places365, texture]
